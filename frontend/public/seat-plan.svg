<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#F1F5F9"/>

  <!-- Field / Pitch -->
  <rect x="150" y="150" width="500" height="300" rx="30" fill="#0A3055" />
  <text x="400" y="310" font-family="sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">PITCH STANDING</text>
  
  <!-- Stage -->
  <rect x="50" y="150" width="100" height="300" rx="10" fill="#15b292" />
  <text x="100" y="300" font-family="sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle" transform="rotate(-90 100,300)">STAGE</text>

  <!-- Seating Sections (Top) -->
  <g fill="#334155" stroke="#ffffff" stroke-width="2">
    <!-- Lower Tier Top -->
    <rect x="160" y="70" width="80" height="70" rx="5" />
    <rect x="250" y="70" width="80" height="70" rx="5" />
    <rect x="340" y="70" width="80" height="70" rx="5" />
    <rect x="430" y="70" width="80" height="70" rx="5" />
    <rect x="520" y="70" width="80" height="70" rx="5" />
    <!-- Upper Tier Top -->
    <rect x="160" y="10" width="80" height="50" rx="5" fill="#64748b" />
    <rect x="250" y="10" width="80" height="50" rx="5" fill="#64748b" />
    <rect x="340" y="10" width="80" height="50" rx="5" fill="#64748b" />
    <rect x="430" y="10" width="80" height="50" rx="5" fill="#64748b" />
    <rect x="520" y="10" width="80" height="50" rx="5" fill="#64748b" />
  </g>

  <!-- Seating Sections (Bottom) -->
  <g fill="#334155" stroke="#ffffff" stroke-width="2">
    <!-- Lower Tier Bottom -->
    <rect x="160" y="460" width="80" height="70" rx="5" />
    <rect x="250" y="460" width="80" height="70" rx="5" />
    <rect x="340" y="460" width="80" height="70" rx="5" />
    <rect x="430" y="460" width="80" height="70" rx="5" />
    <rect x="520" y="460" width="80" height="70" rx="5" />
    <!-- Upper Tier Bottom -->
    <rect x="160" y="540" width="80" height="50" rx="5" fill="#64748b" />
    <rect x="250" y="540" width="80" height="50" rx="5" fill="#64748b" />
    <rect x="340" y="540" width="80" height="50" rx="5" fill="#64748b" />
    <rect x="430" y="540" width="80" height="50" rx="5" fill="#64748b" />
    <rect x="520" y="540" width="80" height="50" rx="5" fill="#64748b" />
  </g>

  <!-- Seating Sections (Right Curve) -->
  <g fill="#334155" stroke="#ffffff" stroke-width="2">
    <!-- Lower Curve -->
    <path d="M 610 70 A 200 200 0 0 1 660 150 L 610 150 A 150 150 0 0 0 570 140 Z" />
    <rect x="660" y="160" width="70" height="60" rx="5" />
    <rect x="660" y="230" width="70" height="60" rx="5" />
    <rect x="660" y="300" width="70" height="60" rx="5" />
    <rect x="660" y="370" width="70" height="60" rx="5" />
    <path d="M 660 450 A 200 200 0 0 1 610 530 L 570 460 A 150 150 0 0 0 610 450 Z" />
    
    <!-- Upper Curve -->
    <rect x="740" y="160" width="50" height="60" rx="5" fill="#64748b" />
    <rect x="740" y="230" width="50" height="60" rx="5" fill="#64748b" />
    <rect x="740" y="300" width="50" height="60" rx="5" fill="#64748b" />
    <rect x="740" y="370" width="50" height="60" rx="5" fill="#64748b" />
  </g>

  <!-- Text Labels for Sections -->
  <g font-family="sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
    <!-- Top Lower -->
    <text x="200" y="110">18</text>
    <text x="290" y="110">19</text>
    <text x="380" y="110">20</text>
    <text x="470" y="110">21</text>
    <text x="560" y="110">22</text>
    <!-- Bottom Lower -->
    <text x="200" y="500">5</text>
    <text x="290" y="500">4</text>
    <text x="380" y="500">3</text>
    <text x="470" y="500">2</text>
    <text x="560" y="500">1</text>
    
    <!-- Right Lower -->
    <text x="695" y="195">24</text>
    <text x="695" y="265">25</text>
    <text x="695" y="335">26</text>
    <text x="695" y="405">27</text>
  </g>
</svg>
